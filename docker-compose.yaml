version: "3.9"  # Versión de Docker Compose

services:

  # zookeper (Kafka depende de él)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181  # Puerto interno de Zookeeper

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper  # Kafka necesita Zookeeper
    ports:
      - "9092:9092"  # Puerto para conexiones externas
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dirección interna dentro de Docker
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      # Factor de replicación (1 porque es entorno local)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Spark master
  spark-master:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=master  # Este nodo es el master
    ports:
      - "8080:8080"  # UI de Spark

  # Spark worker
  spark-worker:
    image: bitnami/spark:3.5
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker  # Nodo worker
      - SPARK_MASTER_URL=spark://spark-master:7077  # Conexión al master

  # minio (Data Lake tipo S3)
  minio:
    image: minio/minio
    # Arranca el servidor y la consola web
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # API S3
      - "9001:9001"  # Interfaz web
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - minio_data:/data  # Persistencia de datos

  # postgres
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persistencia

  # Postgres para airflow
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data

  # Airflow webserver (UI)
  airflow-webserver:
    image: apache/airflow:2.8.1
    depends_on:
      - postgres-airflow
    environment:
      # Ejecuta tareas en local (no cluster)
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # Conexión a la BD de Airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    ports:
      - "8081:8080"  # UI accesible en localhost:8081
    volumes:
      - ./orquestacion:/opt/airflow/dags  # Carpeta de DAGs

  # airflow scheduler
  airflow-scheduler:
    image: apache/airflow:2.8.1
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    volumes:
      - ./orquestacion:/opt/airflow/dags

  polymarket-producers:
    build:
      context: ./infraestructura
      dockerfile: Dockerfile.producers
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:9092  # Dirección del broker

  # servicio de reportes
  # (escribe en el volumen compartido)
  reporting-service:
    build:
      context: ./infraestructura
      dockerfile: Dockerfile.reporting
    volumes:
      - shared_reports:/shared  # Aquí guarda gráficos/reportes

  # Bot de telegram
  # (lee del volumen compartido)
  messaging-bot:
    build:
      context: ./infraestructura
      dockerfile: Dockerfile.notifications
    depends_on:
      - reporting-service
    volumes:
      # solo lectura
      - shared_reports:/shared:ro # ro es read-only

# volúmenes (persistencia dee datos)
volumes:
  minio_data: # Datos del data lake
  postgres_data: # Datos de la BD principal
  postgres_airflow_data: # Datos de Airflow

  # volumen compartido entre servicios
  shared_reports: